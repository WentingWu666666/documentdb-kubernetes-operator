# Prometheus + Grafana stack for DocumentDB K8s observability POC.
#
# Usage:
#   kubectl apply -f telemetry/grafana/grafana-stack.yaml
#   kubectl port-forward svc/grafana -n monitoring 3000:3000
#   Open http://localhost:3000 (admin/admin)
#
# Pre-provisioned dashboard: "DocumentDB Overview"
# Prometheus scrapes OTel Collector sidecar pods on port 8889.

---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'otel-collector'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Only scrape pods with the otel-collector container
          - source_labels: [__meta_kubernetes_pod_container_name]
            action: keep
            regex: otel-collector
          # Target the prometheus exporter port
          - source_labels: [__meta_kubernetes_pod_ip]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: $1:8889
          # Add pod name label
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          # Add namespace label
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=1h"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  default.yml: |
    apiVersion: 1
    providers:
      - name: 'DocumentDB'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  documentdb-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "CPU Utilization",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1 },
            "overrides": []
          },
          "targets": [
            { "expr": "avg without(cpu) (system_cpu_utilization_ratio)", "legendFormat": "{{state}}", "refId": "A" }
          ]
        },
        {
          "title": "Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "targets": [
            { "expr": "system_memory_usage_bytes", "legendFormat": "{{state}}", "refId": "A" }
          ]
        },
        {
          "title": "Database Connections",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            { "expr": "documentdb_connections", "legendFormat": "{{state}}", "refId": "A" }
          ]
        },
        {
          "title": "Replication Lag",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 5 }, { "color": "red", "value": 30 }] }
            },
            "overrides": []
          },
          "targets": [
            { "expr": "documentdb_replication_lag", "legendFormat": "lag", "refId": "A" }
          ]
        },
        {
          "title": "Index Scans (Top 10)",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "options": { "displayMode": "gradient", "orientation": "horizontal" },
          "targets": [
            { "expr": "topk(10, documentdb_index_scans)", "legendFormat": "{{index_name}}", "refId": "A" }
          ]
        },
        {
          "title": "Disk I/O",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "unit": "Bps" }, "overrides": [] },
          "targets": [
            { "expr": "rate(system_disk_io_bytes_total[5m])", "legendFormat": "{{device}} {{direction}}", "refId": "A" }
          ]
        },
        {
          "title": "Network I/O",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "unit": "Bps" }, "overrides": [] },
          "targets": [
            { "expr": "rate(system_network_io_bytes_total[5m])", "legendFormat": "{{device}} {{direction}}", "refId": "A" }
          ]
        },
        {
          "title": "Filesystem Usage",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit", "min": 0, "max": 1,
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.7 }, { "color": "red", "value": 0.9 }] }
            },
            "overrides": []
          },
          "targets": [
            { "expr": "system_filesystem_utilization_ratio", "legendFormat": "{{mountpoint}}", "refId": "A" }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["documentdb", "otel", "k8s"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" },
            "hide": 0,
            "includeAll": false,
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "type": "datasource"
          },
          {
            "name": "namespace",
            "type": "query",
            "query": "label_values(documentdb_connections, namespace)",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
            "includeAll": true,
            "current": { "selected": true, "text": "All", "value": "$__all" }
          },
          {
            "name": "pod",
            "type": "query",
            "query": "label_values(documentdb_connections{namespace=~\"$namespace\"}, pod)",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
            "includeAll": true,
            "current": { "selected": true, "text": "All", "value": "$__all" }
          }
        ]
      },
      "time": { "from": "now-30m", "to": "now" },
      "title": "DocumentDB K8s Overview",
      "uid": "documentdb-k8s-overview"
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
